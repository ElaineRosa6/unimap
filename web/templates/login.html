<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>UniMap - 登录</title>
	<link rel="stylesheet" href="/static/css/style.css?v={{.staticVersion}}">
</head>
<body class="login-page">
	<div class="login-container">
		<div class="login-card">
			<div class="login-header">
				<h1>UniMap</h1>
				<p>多引擎网络资产查询平台</p>
			</div>
			<form id="login-form">
				<div class="form-group">
					<label for="username">用户名</label>
					<input type="text" id="username" name="username" autocomplete="username" required autofocus>
				</div>
				<div class="form-group">
					<label for="password">密码</label>
					<input type="password" id="password" name="password" autocomplete="current-password" required>
				</div>
				<div id="login-error" class="login-error" style="display:none;"></div>
				<button type="submit" id="login-btn" class="btn btn-primary">登录</button>
			</form>
		</div>
	</div>
	<script nonce="{{.CSPNonce}}">
	(function() {
		function getCookie(name) {
			var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
			return match ? decodeURIComponent(match[2]) : '';
		}

		document.getElementById('login-form').addEventListener('submit', async function(e) {
			e.preventDefault();
			var btn = document.getElementById('login-btn');
			var errDiv = document.getElementById('login-error');
			var username = document.getElementById('username').value.trim();
			var password = document.getElementById('password').value;
			var csrfToken = getCookie('unimap_csrf');

			if (!username || !password) {
				errDiv.textContent = '请输入用户名和密码';
				errDiv.style.display = 'block';
				return;
			}

			btn.disabled = true;
			btn.textContent = '登录中...';
			errDiv.style.display = 'none';

			try {
				var resp = await fetch('/api/login', {
					method: 'POST',
					headers: {'Content-Type': 'application/x-www-form-urlencoded'},
					body: new URLSearchParams({
						username: username,
						password: password,
						csrf_token: csrfToken
					})
				});
				var data = await resp.json();
				if (resp.ok && data.success) {
					window.location.href = data.redirect || '/';
				} else {
					errDiv.textContent = data.error || '登录失败';
					errDiv.style.display = 'block';
				}
			} catch (err) {
				errDiv.textContent = '网络错误，请重试';
				errDiv.style.display = 'block';
			} finally {
				btn.disabled = false;
				btn.textContent = '登录';
			}
		});
	})();
	</script>
</body>
</html>
