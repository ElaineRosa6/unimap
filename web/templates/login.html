<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>UniMap</title>
	<link rel="stylesheet" href="/static/css/style.css?v={{.staticVersion}}">
</head>
<body class="login-page">
	<!-- Background layers -->
	<div class="login-bg" aria-hidden="true">
		<div class="login-bg__grid"></div>
		<div class="login-bg__noise"></div>
		<div class="login-bg__glow"></div>
	</div>

	<div class="login-wrapper">
		<!-- Left branding panel -->
		<div class="login-brand">
			<div class="login-brand__inner">
				<div class="login-logo">
					<span class="login-logo__mark">U</span>
					<span class="login-logo__text">UniMap</span>
				</div>
				<p class="login-tagline">多引擎网络资产查询平台</p>
				<div class="login-engines">
					<span class="login-engines__label">引擎</span>
					<div class="login-engines__list">
						<span class="login-engines__chip">FOFA</span>
						<span class="login-engines__chip">Hunter</span>
						<span class="login-engines__chip">ZoomEye</span>
						<span class="login-engines__chip">Quake</span>
						<span class="login-engines__chip">Shodan</span>
					</div>
				</div>
			</div>
		</div>

		<!-- Right form panel -->
		<div class="login-panel">
			<div class="login-card">
				<header class="login-header">
					<h1>登录</h1>
					<p class="login-sub">输入凭证以访问控制台</p>
				</header>
				<form id="login-form" autocomplete="off">
					<!-- Hidden decoy fields to defeat Chrome autofill -->
					<input type="text" name="prevent_autofill_username" class="hidden-init" tabindex="-1" autocomplete="username">
					<input type="password" name="prevent_autofill_password" class="hidden-init" tabindex="-1" autocomplete="current-password">
					<div class="field">
						<label for="username">用户名</label>
						<input type="text" id="username" name="username" autocomplete="off" placeholder="admin" required autofocus>
					</div>
					<div class="field">
						<label for="password">密码</label>
						<input type="password" id="password" name="password" autocomplete="new-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
					</div>
						<div id="login-error" class="login-error hidden-init"></div>
					<button type="submit" id="login-btn" class="btn btn-primary">
						<span class="btn__text">登录</span>
						<span class="btn__spinner hidden-init" aria-hidden="true"></span>
					</button>
				</form>
			</div>
			<p class="login-footer">UniMap &copy; 2026</p>
		</div>
	</div>

	<script nonce="{{.CSPNonce}}">
	(function() {
		function getCookie(name) {
			var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
			return match ? decodeURIComponent(match[2]) : '';
		}

		document.getElementById('login-form').addEventListener('submit', async function(e) {
			e.preventDefault();
			var btn = document.getElementById('login-btn');
			var btnText = btn.querySelector('.btn__text');
			var btnSpinner = btn.querySelector('.btn__spinner');
			var errDiv = document.getElementById('login-error');
			var username = document.getElementById('username').value.trim();
			var password = document.getElementById('password').value;
			var csrfToken = getCookie('unimap_csrf');

			if (!username || !password) {
				errDiv.textContent = '请输入用户名和密码';
				errDiv.style.display = 'block';
				return;
			}

			btn.disabled = true;
			btnText.style.display = 'none';
			btnSpinner.style.display = 'inline-block';
			errDiv.style.display = 'none';

			try {
				var resp = await fetch('/api/v1/login', {
					method: 'POST',
					headers: {'Content-Type': 'application/x-www-form-urlencoded'},
					body: new URLSearchParams({
						username: username,
						password: password,
						csrf_token: csrfToken
					})
				});
				var data = await resp.json();
				if (resp.ok && data.success) {
					window.location.href = data.redirect || '/';
				} else {
					errDiv.textContent = data.error || '登录失败';
					errDiv.style.display = 'block';
				}
			} catch (err) {
				errDiv.textContent = '网络错误，请重试';
				errDiv.style.display = 'block';
			} finally {
				btn.disabled = false;
				btnText.style.display = 'inline';
				btnSpinner.style.display = 'none';
			}
		});
	})();
	</script>
</body>
</html>
