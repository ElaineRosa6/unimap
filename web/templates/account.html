{{define "account-page"}}
{{template "head" .}}
{{template "header" (dict "ActiveNav" "account" "staticVersion" .staticVersion)}}

			<main>
				<section class="account-section">
					<h2>账号管理</h2>

					<div class="tabs" role="tablist">
						<button class="tab-btn active" data-tab="tab-password" role="tab" aria-selected="true">修改密码</button>
						<button class="tab-btn" data-tab="tab-user" role="tab" aria-selected="false">当前用户</button>
					</div>

					<div class="tab-content active" id="tab-password" role="tabpanel">
						<form id="change-password-form">
							<div class="form-group">
								<label for="current-password">当前密码</label>
								<input type="password" id="current-password" name="current_password" required autocomplete="current-password">
							</div>
							<div class="form-group">
								<label for="new-password">新密码</label>
								<input type="password" id="new-password" name="new_password" required minlength="8" autocomplete="new-password">
								<small class="form-text">至少 8 个字符</small>
							</div>
							<div class="form-group">
								<label for="confirm-password">确认新密码</label>
								<input type="password" id="confirm-password" name="confirm_password" required minlength="8" autocomplete="new-password">
							</div>
							<div class="form-group action-buttons">
								<button type="submit" class="btn btn-primary">保存密码</button>
							</div>
						</form>
					</div>

					<div class="tab-content" id="tab-user" role="tabpanel">
						<div class="account-info">
							<div class="account-info-row">
								<span class="label">用户名</span>
								<span class="value">{{.username}}</span>
							</div>
							<div class="account-info-row">
								<span class="label">管理员 Token</span>
								<span class="value">
									<span id="token-display">{{.tokenPrefix}}••••</span>
									<button type="button" class="btn btn-sm btn-copy" id="copy-token-btn" title="复制完整 Token">
										<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
										<span>复制</span>
									</button>
								</span>
							</div>
							<p class="form-text" style="margin-top:8px;">用于 Chrome Extension 桥接认证。复制后粘贴到 Extension 选项页面的 Admin Token 字段。</p>
						</div>
					</div>
				</section>

				<div class="toast" id="toast"></div>
			</main>

			<script nonce="{{.CSPNonce}}">
			function showToast(msg, type) {
				const t = document.getElementById('toast');
				t.textContent = msg;
				t.className = 'toast ' + type;
				t.style.display = 'block';
				setTimeout(() => t.style.display = 'none', 3000);
			}

			// Tab switching
			document.querySelectorAll('.tab-btn').forEach(function(btn) {
				btn.addEventListener('click', function() {
					document.querySelectorAll('.tab-btn').forEach(function(b) {
						b.classList.remove('active');
						b.setAttribute('aria-selected', 'false');
					});
					document.querySelectorAll('.tab-content').forEach(function(c) {
						c.classList.remove('active');
					});
					this.classList.add('active');
					this.setAttribute('aria-selected', 'true');
					document.getElementById(this.dataset.tab).classList.add('active');
				});
			});

			// Copy admin token
			document.getElementById('copy-token-btn').addEventListener('click', async () => {
				const btn = document.getElementById('copy-token-btn');
				try {
					const res = await fetch('/api/v1/account/admin-token');
					const data = await res.json();
					if (!res.ok || !data.token) {
						showToast(data.error || '未配置 Admin Token', 'error');
						return;
					}
					await navigator.clipboard.writeText(data.token);
					btn.classList.add('copied');
					btn.querySelector('span').textContent = '已复制';
					showToast('Token 已复制到剪贴板', 'success');
					setTimeout(() => {
						btn.classList.remove('copied');
						btn.querySelector('span').textContent = '复制';
					}, 2000);
				} catch (err) {
					showToast('复制失败: ' + err.message, 'error');
				}
			});

			document.getElementById('change-password-form').addEventListener('submit', async (e) => {
				e.preventDefault();
				const current = document.getElementById('current-password').value;
				const newPwd = document.getElementById('new-password').value;
				const confirm = document.getElementById('confirm-password').value;

				if (newPwd.length < 8) {
					showToast('新密码至少 8 个字符', 'error');
					return;
				}
				if (newPwd !== confirm) {
					showToast('两次输入的新密码不一致', 'error');
					return;
				}

				try {
					const res = await fetch('/api/v1/account/change-password', {
						method: 'POST',
						headers: {'Content-Type': 'application/json'},
						body: JSON.stringify({current_password: current, new_password: newPwd})
					});
					const data = await res.json();
					if (!res.ok) {
						showToast(data.error || '修改失败', 'error');
						return;
					}
					showToast('密码已更新', 'success');
					e.target.reset();
				} catch(err) {
					showToast('请求失败: ' + err.message, 'error');
				}
			});
			</script>
	{{template "footer" .}}
{{end}}
