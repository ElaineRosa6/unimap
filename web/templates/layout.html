{{define "head"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{.Title}} - UniMap</title>
	<link rel="stylesheet" href="/static/css/style.css?v={{.staticVersion}}">
</head>
{{end}}

{{define "head-plain"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{.Title}}</title>
	<link rel="stylesheet" href="/static/css/style.css?v={{.staticVersion}}">
</head>
{{end}}

{{define "header"}}
<body>
	<header>
		<h1>UniMap - 多引擎网络资产查询</h1>
		<p>支持 FOFA、Hunter、ZoomEye、Quake 等多个搜索引擎的统一查询接口</p>
		<nav class="nav-bar">
			<a href="/"{{if eq .ActiveNav "index"}} class="active"{{end}}>首页</a>
			<a href="/quota"{{if eq .ActiveNav "quota"}} class="active"{{end}}>配额</a>
			<a href="/batch-screenshot"{{if eq .ActiveNav "batch"}} class="active"{{end}}>批量截图</a>
			<a href="/monitor"{{if eq .ActiveNav "monitor"}} class="active"{{end}}>监控</a>
			<a href="/scheduler"{{if eq .ActiveNav "scheduler"}} class="active"{{end}}>定时任务</a>
			<form method="POST" action="/api/logout" class="logout-form">
				<button type="submit" class="btn-logout">退出</button>
			</form>
		</nav>
	</header>
{{end}}

{{define "footer"}}
	<footer>
		<p>&copy; 2026 UniMap - 多引擎网络资产查询系统</p>
	</footer>

	<script src="/static/js/main.js?v={{.staticVersion}}"></script>
</body>
</html>
{{end}}
