{{define "head"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{if .Title}}{{.Title}}{{else}}UniMap{{end}}</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="preconnect" href="https://fonts.gstatic.font.im" crossorigin>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
	<link rel="stylesheet" href="/static/css/style.css?v={{.staticVersion}}">
	<link rel="stylesheet" href="/static/css/utils.css?v={{.staticVersion}}">
</head>
{{end}}

{{define "head-plain"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{if .Title}}{{.Title}}{{else}}UniMap{{end}}</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="preconnect" href="https://fonts.gstatic.font.im" crossorigin>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
	<link rel="stylesheet" href="/static/css/style.css?v={{.staticVersion}}">
	<link rel="stylesheet" href="/static/css/utils.css?v={{.staticVersion}}">
</head>
{{end}}

{{define "header"}}
<body>
	<header>
		<a href="/" class="logo">
			<span class="logo-mark">U</span>
			<span class="logo-text">UniMap</span>
		</a>
		<nav class="nav-bar">
			<a href="/"{{if eq .ActiveNav "index"}} class="active"{{end}}>查询</a>
			<a href="/quota"{{if eq .ActiveNav "quota"}} class="active"{{end}}>配额</a>
			<a href="/monitor"{{if eq .ActiveNav "monitor"}} class="active"{{end}}>巡检</a>
			<a href="/port-scan"{{if eq .ActiveNav "port-scan"}} class="active"{{end}}>端口扫描</a>
			<a href="/scheduler"{{if eq .ActiveNav "scheduler"}} class="active"{{end}}>任务</a>
			<a href="/icp"{{if eq .ActiveNav "icp"}} class="active"{{end}}>ICP</a>
			<a href="/account"{{if eq .ActiveNav "account"}} class="active"{{end}}>账号</a>
			<a href="/settings"{{if eq .ActiveNav "settings"}} class="active"{{end}}>设置</a>
			<form method="POST" action="/api/v1/logout" class="logout-form">
				<button type="submit" class="btn-logout">退出</button>
			</form>
		</nav>
	</header>
{{end}}

{{define "footer"}}
	<footer>
		<p>&copy; 2026 UniMap</p>
	</footer>

	<script src="/static/js/main.js?v={{.staticVersion}}"></script>
</body>
</html>
{{end}}
