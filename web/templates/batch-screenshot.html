{{template "head-plain" (dict "Title" "批量截图 - UniMap" "staticVersion" .staticVersion)}}
{{template "header" (dict "ActiveNav" "batch" "staticVersion" .staticVersion)}}

	<main>
		<section class="query-form">
			<div class="url-list-container">
				<div class="url-input-area">
					<textarea id="url-list" placeholder="请输入URL列表，每行一个&#10;例如：&#10;https://www.example.com&#10;https://www.google.com&#10;example.org&#10;192.168.1.1:8080"></textarea>
				</div>
				<div class="url-stats">
					<h4>统计信息</h4>
					<div class="stat-item">
						<span>总URL数</span>
						<span class="stat-value" id="total-urls">0</span>
					</div>
					<div class="stat-item">
						<span>有效URL</span>
						<span class="stat-value" id="valid-urls">0</span>
					</div>
					<div class="stat-item">
						<span>无效URL</span>
						<span class="stat-value" id="invalid-urls">0</span>
					</div>
				</div>
			</div>

			<div class="options-group">
				<div class="form-group">
					<label for="concurrency">并发数</label>
					<input type="number" id="concurrency" min="1" max="10" value="5">
				</div>
				<div class="form-group">
					<label for="batch-id">批次ID（可选）</label>
					<input type="text" id="batch-id" placeholder="自动生成">
				</div>
			</div>

			<div class="form-group action-buttons">
				<button type="button" class="btn btn-primary" id="btn-start-batch">开始截图</button>
				<button type="button" class="btn btn-secondary" id="btn-clear-urls">清空</button>
				<button type="button" class="btn btn-secondary" id="btn-load-example">加载示例</button>
				<button type="button" class="btn btn-secondary" id="btn-import-file">导入文件</button>
				<input type="file" id="file-input" accept=".txt,.csv,.xlsx,.xls" class="hidden-input">
			</div>

			<div class="progress-container" id="progress-container">
				<div class="progress-bar">
					<div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
				</div>
				<div class="progress-text" id="progress-text">准备中...</div>
			</div>

			<div class="results-container hidden" id="results-container">
				<div id="results-list"></div>
			</div>
		</section>
	</main>

<script nonce="{{.CSPNonce}}">
document.addEventListener('DOMContentLoaded', function() {
	const urlList = document.getElementById('url-list');
	const concurrency = document.getElementById('concurrency');
	const batchId = document.getElementById('batch-id');
	const progressContainer = document.getElementById('progress-container');
	const progressBarFill = document.getElementById('progress-bar-fill');
	const progressText = document.getElementById('progress-text');
	const resultsContainer = document.getElementById('results-container');
	const resultsList = document.getElementById('results-list');

	// URL 统计
	urlList.addEventListener('input', function() {
		const lines = urlList.value.split('\n').filter(l => l.trim());
		document.getElementById('total-urls').textContent = lines.length;
		const valid = lines.filter(l => /^(https?:\/\/|[\w.-]+:\d+)/.test(l.trim()));
		document.getElementById('valid-urls').textContent = valid.length;
		document.getElementById('invalid-urls').textContent = lines.length - valid.length;
	});

	// 加载示例
	document.getElementById('btn-load-example').addEventListener('click', function() {
		urlList.value = 'https://www.example.com\nhttps://www.baidu.com\nhttp://test.example.org\nhttps://httpbin.org';
		urlList.dispatchEvent(new Event('input'));
	});

	// 清空
	document.getElementById('btn-clear-urls').addEventListener('click', function() {
		urlList.value = '';
		urlList.dispatchEvent(new Event('input'));
		resultsContainer.classList.add('hidden');
	});

	// 导入文件
	document.getElementById('btn-import-file').addEventListener('click', function() {
		document.getElementById('file-input').click();
	});
	document.getElementById('file-input').addEventListener('change', function(e) {
		const file = e.target.files[0];
		if (!file) return;
		const reader = new FileReader();
		reader.onload = function(ev) {
			urlList.value = ev.target.result;
			urlList.dispatchEvent(new Event('input'));
		};
		reader.readAsText(file);
		e.target.value = '';
	});

	// 开始截图
	document.getElementById('btn-start-batch').addEventListener('click', async function() {
		const urls = urlList.value.split('\n').map(l => l.trim()).filter(Boolean);
		if (urls.length === 0) { alert('请输入至少一个URL'); return; }
		const btn = this;
		btn.disabled = true; btn.textContent = '截图中...';
		progressContainer.style.display = 'block';
		progressBarFill.style.width = '0%';
		progressText.textContent = '正在截图...';
		resultsContainer.classList.add('hidden');
		try {
			const resp = await fetch('/api/screenshot/batch-urls', {
				method: 'POST',
				headers: {'Content-Type': 'application/json'},
				body: JSON.stringify({ urls, concurrency: parseInt(concurrency.value)||5, batch_id: batchId.value||'' })
			});
			const data = await resp.json();
			if (!resp.ok || data.error) {
				progressText.textContent = '截图失败: ' + (data.error?.message || data.message || '请求被拒绝');
				btn.disabled = false; btn.textContent = '开始截图';
				return;
			}
			progressBarFill.style.width = '100%';
			progressText.textContent = '截图完成';
			resultsContainer.classList.remove('hidden');
			resultsList.innerHTML = '';
			(data.results || []).forEach(r => {
				const div = document.createElement('div');
				div.className = 'result-item';
				const status = r.success ? '✅ 成功' : '❌ 失败';
				const link = r.file_path ? ` <a href="${r.file_path}" target="_blank">查看</a>` : '';
				div.innerHTML = `<strong>${r.url}</strong> — ${status} ${r.error || ''}${link}`;
				resultsList.appendChild(div);
			});
		} catch(e) {
			progressText.textContent = '截图失败: ' + e.message;
		}
		btn.disabled = false; btn.textContent = '开始截图';
	});
});
</script>
{{template "footer" .}}
